name: wasix integration suite
"on":
  pull_request:
    paths:
      - "packages/wasi/**"
      - ".github/workflows/wasix-suite.yml"
  push:
    branches:
      - main
      - "wasix/**"

jobs:
  suite:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install root dependencies
        run: npm run bootstrap

      # Cache the vendored wasmer tarball extract + the built wasix-libc
      # sysroot. Both are keyed on the pinned SHA and the suite constants
      # file (bumping the SHA invalidates the cache automatically). The
      # built .wasm artifacts under `public/bin/wasix-tests/` are keyed on
      # the vendored tree hash and the build script itself, so a wasixcc
      # toolchain bump forces a rebuild.
      - name: Cache wasix-libc toolchain
        id: cache-wasix-libc
        uses: actions/cache@v4
        with:
          path: ~/.wasix
          key: >-
            wasix-libc-v12-${{ runner.os }}-${{
              hashFiles('.github/workflows/wasix-suite.yml')
            }}

      - name: Cache vendored wasmer checkout
        uses: actions/cache@v4
        with:
          path: packages/wasi/tests/wasix-vendor
          key: >-
            wasmer-vendor-${{
              hashFiles('packages/wasi/tests/wasix-suite.constants.mjs')
            }}

      - name: Cache built wasix-suite binaries
        uses: actions/cache@v4
        with:
          path: packages/wasi/public/bin/wasix-tests
          key: >-
            wasix-bins-${{ runner.os }}-${{
              hashFiles('packages/wasi/tests/wasix-suite.constants.mjs',
                        'packages/wasi/tests/build-wasix-suite.mjs')
            }}

      - name: Install wasixcc toolchain
        # Pulls the prebuilt wasix-libc sysroot + wrapper scripts.
        # Exposes `wasixcc` on PATH for the build harness.
        if: steps.cache-wasix-libc.outputs.cache-hit != 'true'
        run: |
          set -euxo pipefail
          WASIX_LIBC_VERSION="v12"
          WASIX_SDK_URL="https://github.com/wasix-org/wasix-libc/releases/download/${WASIX_LIBC_VERSION}/wasix-libc-${WASIX_LIBC_VERSION}-linux.tar.gz"
          INSTALL_DIR="$HOME/.wasix"
          mkdir -p "$INSTALL_DIR"
          if ! curl --fail --location --retry 3 --output /tmp/wasix-libc.tar.gz "$WASIX_SDK_URL"; then
            echo "::warning::failed to download wasix-libc ${WASIX_LIBC_VERSION} — wasix-suite will skip."
            exit 0
          fi
          tar -xzf /tmp/wasix-libc.tar.gz -C "$INSTALL_DIR" --strip-components=1 || {
            echo "::warning::failed to extract wasix-libc — wasix-suite will skip."
            exit 0
          }

      - name: Expose wasixcc on PATH
        run: |
          if [ -d "$HOME/.wasix/bin" ]; then
            echo "$HOME/.wasix/bin" >> "$GITHUB_PATH"
          fi

      - name: Probe wasixcc
        id: probe
        run: |
          if command -v wasixcc >/dev/null 2>&1; then
            echo "available=1" >> "$GITHUB_OUTPUT"
            wasixcc --version || true
          else
            echo "available=0" >> "$GITHUB_OUTPUT"
            echo "::warning::wasixcc not on PATH — the suite job will run with no built binaries."
          fi

      - name: Fetch + build wasix suite binaries
        working-directory: packages/wasi
        run: |
          npm run test:prepare:wasix-suite

      - name: Install Playwright browsers
        working-directory: packages/wasi
        run: npx playwright install --with-deps

      - name: Run wasix-suite Playwright tests
        working-directory: packages/wasi
        # Add the JSON reporter alongside the existing html reporter so
        # the next step can count pass/skip/fail without parsing HTML.
        run: |
          npx playwright test tests/wasix-suite.spec.ts \
            --reporter=list,html,json \
            || echo "::notice::wasix-suite playwright exited non-zero — see summary for counts."
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: playwright-report/wasix-suite.json

      - name: Publish pass/skip counts to job summary
        if: always()
        working-directory: packages/wasi
        run: |
          set -euo pipefail
          REPORT="playwright-report/wasix-suite.json"
          if [ ! -f "$REPORT" ]; then
            echo "::warning::no wasix-suite JSON report at $REPORT"
            {
              echo "## wasix integration suite"
              echo
              echo "_No Playwright JSON report produced._"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          # jq aggregates Playwright's per-test-status counts across the
          # whole suite (stats.{expected,unexpected,skipped,flaky}).
          STATS=$(jq '{expected: .stats.expected,
                       unexpected: .stats.unexpected,
                       skipped: .stats.skipped,
                       flaky: .stats.flaky}' "$REPORT")
          PASSED=$(echo "$STATS" | jq -r '.expected')
          FAILED=$(echo "$STATS" | jq -r '.unexpected')
          SKIPPED=$(echo "$STATS" | jq -r '.skipped')
          FLAKY=$(echo "$STATS" | jq -r '.flaky')
          {
            echo "## wasix integration suite"
            echo
            echo "| result | count |"
            echo "| --- | --- |"
            echo "| passed | ${PASSED} |"
            echo "| failed | ${FAILED} |"
            echo "| skipped | ${SKIPPED} |"
            echo "| flaky | ${FLAKY} |"
            echo
            echo "### Skip breakdown"
            echo
            # Group by skip reason annotation (set in wasix-suite.spec.ts).
            jq -r '
              [.suites[]?.suites[]?.specs[]?.tests[]?.annotations[]?
               | select(.type == "wasix-skip") | .description]
              | group_by(.)
              | map({reason: .[0], count: length})
              | sort_by(-.count)
              | .[]
              | "| \(.reason) | \(.count) |"
            ' "$REPORT" > /tmp/skip-breakdown.md || true
            if [ -s /tmp/skip-breakdown.md ]; then
              echo "| reason | count |"
              echo "| --- | --- |"
              cat /tmp/skip-breakdown.md
            else
              echo "_no categorised skips recorded_"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wasix-suite-playwright-report
          path: packages/wasi/playwright-report
