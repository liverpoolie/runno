name: wasix integration suite
"on":
  pull_request:
    paths:
      - "packages/wasi/**"
      - ".github/workflows/wasix-suite.yml"
  push:
    branches:
      - main
      - "wasix/**"

jobs:
  suite:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install root dependencies
        run: npm run bootstrap

      # Cache the vendored wasmer tarball extract. The wasix toolchain
      # itself is installed by the wasix-org/wasixcc composite action,
      # which manages its own cache via `actions/cache@v4` keyed on its
      # pinned versions. The built .wasm artifacts under
      # `public/bin/wasix-tests/` are keyed on the suite constants and
      # the build script, so a vendored-SHA bump forces a rebuild.
      - name: Cache vendored wasmer checkout
        uses: actions/cache@v4
        with:
          path: packages/wasi/tests/wasix-vendor
          key: >-
            wasmer-vendor-${{
              hashFiles('packages/wasi/tests/wasix-suite.constants.mjs')
            }}

      - name: Cache built wasix-suite binaries
        uses: actions/cache@v4
        with:
          path: packages/wasi/public/bin/wasix-tests
          key: >-
            wasix-bins-${{ runner.os }}-${{
              hashFiles('packages/wasi/tests/wasix-suite.constants.mjs',
                        'packages/wasi/tests/build-wasix-suite.mjs',
                        '.github/workflows/wasix-suite.yml')
            }}

      - name: Install wasixcc toolchain
        # Use the upstream composite action from wasix-org/wasixcc. It
        # pulls a pinned wasixcc binary, the wasix-libc sysroot and the
        # WASIX-aware LLVM toolchain into a managed cache, then puts
        # `wasixcc` on PATH for downstream steps. The previous bespoke
        # tarball-fetch only installed the libc sysroot (no compiler
        # wrapper), which silently no-op'd the build harness and
        # greenwashed the job (Issue #4 review).
        uses: wasix-org/wasixcc@v0.4.3
        with:
          version: v0.4.3
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Probe wasixcc
        # Hard fail if the action didn't put `wasixcc` on PATH — silent
        # missing-toolchain runs are the regression Issue #4 calls out.
        run: |
          set -euxo pipefail
          if ! command -v wasixcc >/dev/null 2>&1; then
            echo "::error::wasixcc not on PATH after install."
            exit 1
          fi
          wasixcc --version || true

      - name: Fetch + build wasix suite binaries
        working-directory: packages/wasi
        env:
          WASIX_SUITE_REQUIRE_BUILD: "1"
        run: |
          npm run test:prepare:wasix-suite

      - name: Install Playwright browsers
        working-directory: packages/wasi
        run: npx playwright install --with-deps

      - name: Assert at least one wasix-suite binary was built
        # Defence-in-depth alongside `WASIX_SUITE_REQUIRE_BUILD=1`:
        # ensure the cached / freshly-built `public/bin/wasix-tests/`
        # actually has artefacts before we hand control to Playwright.
        # An empty dir would otherwise present as a single categorised
        # skip and greenwash the suite (Issue #4 review).
        working-directory: packages/wasi
        run: |
          set -euo pipefail
          shopt -s nullglob
          binaries=(public/bin/wasix-tests/*.wasm)
          if [ "${#binaries[@]}" -eq 0 ]; then
            echo "::error::no wasix-suite binaries under public/bin/wasix-tests — wasixcc install or build script is broken."
            exit 1
          fi
          echo "found ${#binaries[@]} wasix-suite binaries."

      - name: Run wasix-suite Playwright tests
        working-directory: packages/wasi
        # Add the JSON reporter alongside the existing html reporter so
        # the next step can count pass/skip/fail without parsing HTML.
        run: |
          npx playwright test tests/wasix-suite.spec.ts \
            --reporter=list,html,json
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: playwright-report/wasix-suite.json

      - name: Publish pass/skip counts to job summary
        if: always()
        working-directory: packages/wasi
        run: |
          set -euo pipefail
          REPORT="playwright-report/wasix-suite.json"
          if [ ! -f "$REPORT" ]; then
            echo "::warning::no wasix-suite JSON report at $REPORT"
            {
              echo "## wasix integration suite"
              echo
              echo "_No Playwright JSON report produced._"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          # jq aggregates Playwright's per-test-status counts across the
          # whole suite (stats.{expected,unexpected,skipped,flaky}).
          STATS=$(jq '{expected: .stats.expected,
                       unexpected: .stats.unexpected,
                       skipped: .stats.skipped,
                       flaky: .stats.flaky}' "$REPORT")
          PASSED=$(echo "$STATS" | jq -r '.expected')
          FAILED=$(echo "$STATS" | jq -r '.unexpected')
          SKIPPED=$(echo "$STATS" | jq -r '.skipped')
          FLAKY=$(echo "$STATS" | jq -r '.flaky')
          {
            echo "## wasix integration suite"
            echo
            echo "| result | count |"
            echo "| --- | --- |"
            echo "| passed | ${PASSED} |"
            echo "| failed | ${FAILED} |"
            echo "| skipped | ${SKIPPED} |"
            echo "| flaky | ${FLAKY} |"
            echo
            echo "### Skip breakdown"
            echo
            # Group by skip reason annotation (set in wasix-suite.spec.ts).
            jq -r '
              [.suites[]?.suites[]?.specs[]?.tests[]?.annotations[]?
               | select(.type == "wasix-skip") | .description]
              | group_by(.)
              | map({reason: .[0], count: length})
              | sort_by(-.count)
              | .[]
              | "| \(.reason) | \(.count) |"
            ' "$REPORT" > /tmp/skip-breakdown.md || true
            if [ -s /tmp/skip-breakdown.md ]; then
              echo "| reason | count |"
              echo "| --- | --- |"
              cat /tmp/skip-breakdown.md
            else
              echo "_no categorised skips recorded_"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wasix-suite-playwright-report
          path: packages/wasi/playwright-report
